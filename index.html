<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Cleanosolar — Rapport</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eef2ff;min-height:100vh;padding:14px 10px;font-size:15px}
.wrap{max-width:600px;margin:0 auto}
.header{background:linear-gradient(135deg,#1e3a5f,#2563eb);border-radius:14px;padding:14px 18px;margin-bottom:14px;color:#fff;display:flex;align-items:center;gap:12px}
.logo{font-size:17px;font-weight:800}.sub{font-size:11px;opacity:.75}
.progress{display:flex;margin-bottom:14px;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.ps{flex:1;padding:8px 2px;text-align:center;font-size:10px;background:#f8fafc;color:#94a3b8;border-right:1px solid #e2e8f0}
.ps:last-child{border-right:none}
.ps.active{background:#2563eb;color:#fff;font-weight:700}
.ps.done{background:#1e3a5f;color:#fff}
.card{background:#fff;border-radius:13px;padding:18px;box-shadow:0 1px 5px rgba(0,0,0,.08);margin-bottom:12px}
h2{font-size:15px;color:#1e3a5f;margin-bottom:12px;font-weight:700}
input,textarea{width:100%;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-size:15px;font-family:inherit;outline:none;background:#fff;-webkit-appearance:none}
input:focus,textarea:focus{border-color:#2563eb}
textarea{resize:vertical;min-height:80px}
.lbl{font-size:12px;font-weight:700;color:#374151;display:block;margin-bottom:4px;margin-top:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.btn{border:none;border-radius:10px;padding:14px 18px;font-size:15px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;margin-top:8px;-webkit-appearance:none;touch-action:manipulation}
.bp{background:#2563eb;color:#fff}.bp:disabled{background:#bfdbfe}
.bd{background:#1e3a5f;color:#fff}
.bl{background:#f1f5f9;color:#1e293b;border:1.5px solid #e2e8f0}
.bg{background:#22c55e;color:#fff}
.err{background:#fee2e2;color:#dc2626;padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:13px;display:none}
.ok-box{background:#f0fdf4;border:1px solid #86efac;border-radius:10px;padding:12px;text-align:center;color:#16a34a;font-weight:700;font-size:14px;margin-top:8px}
.info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:10px 14px;font-size:12px;color:#1e40af;margin-top:10px;line-height:1.6}
.warn{background:#fef9c3;border-radius:8px;padding:8px 12px;font-size:12px;color:#92400e;margin-top:10px}
.loading{text-align:center;padding:40px 20px;color:#64748b;font-size:14px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin .8s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}
.ci{padding:12px 14px;border-radius:10px;border:1.5px solid #e8ecf0;background:#fafbfc;cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.ci.sel{border-color:#2563eb;background:#eff6ff}
.ci-name{font-weight:600;font-size:14px;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ci-sub{font-size:11px;color:#64748b;margin-top:2px}
.badge{font-size:10px;padding:3px 8px;border-radius:20px;white-space:nowrap;margin-left:8px;flex-shrink:0;font-weight:600}
.scroll{max-height:380px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.pgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.pbox{border:2px dashed #cbd5e1;border-radius:10px;overflow:hidden;text-align:center;background:#f8fafc;cursor:pointer;min-height:90px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.pbox.got{border-color:#22c55e;background:#f0fdf4}
.pbox input{display:none}
.pbox img{width:100%;height:65px;object-fit:cover}
.plbl{font-size:9px;color:#94a3b8;padding:3px 4px}
.plbl.ok{color:#16a34a;font-weight:700}
.nav{display:flex;gap:10px;margin-top:12px}
.prev-hdr{background:linear-gradient(135deg,#1e3a5f,#2563eb);padding:13px 16px;color:#fff;border-radius:11px 11px 0 0;display:flex;justify-content:space-between}
.prev-body{border:1.5px solid #e2e8f0;border-top:none;border-radius:0 0 11px 11px;padding:14px 16px;margin-bottom:12px;font-size:13px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px 14px;background:#f8fafc;border-radius:8px;padding:11px;margin-bottom:11px}
.sec{background:#f8fafc;border-radius:6px;padding:8px 10px;line-height:1.5;font-size:13px;margin-bottom:8px}
.stitle{font-weight:700;color:#1e3a5f;font-size:11px;margin-bottom:3px;margin-top:8px}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <span style="font-size:30px">☀️</span>
    <div><div class="logo">Cleanosolar</div><div class="sub">Rapport d'intervention 2026</div></div>
  </div>
  <div class="progress" id="prog"></div>
  <div class="err" id="err"></div>
  <div id="main"></div>
  <div class="nav" id="nav"></div>
</div>

<script>
const DB_ID = "1d16b0e7fbc9808594e6f4e2dfd4a4e4";
const API = "/.netlify/functions/notion";

async function notionCall(method, path, body){
  const res = await fetch(API, {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({method, path, body})
  });
  return res.json();
}
const EXCLUDE = ["Payé","Facturé"];

const PHOTOS=[
  {k:"toit",l:"🏠 Toit"},{k:"avant",l:"🔴 Avant"},{k:"apres",l:"✅ Après"},
  {k:"tache1",l:"🔧 Tâche 1"},{k:"tache2",l:"🔧 Tâche 2"},
  {k:"eau1",l:"💧 Eau 1"},{k:"eau2",l:"💧 Eau 2"},
  {k:"acces1",l:"🪜 Accès 1"},{k:"acces2",l:"🪜 Accès 2"},
];

const EC={
  "Nettoyé":"#dbeafe:#1d4ed8",
  "Planifier confirmé - Team 1":"#ffedd5:#c2410c",
  "Planifier confirmé - Team 2":"#fce7f3:#be185d",
  "Planifié - non confirmé - Team 1":"#f3f4f6:#6b7280",
  "Planifié - non confirmé - Team 2":"#f3f4f6:#6b7280",
  "Transmis à l'équipe d'intervention":"#ede9fe:#7c3aed"
};
const ec=e=>{const c=(EC[e]||"#f3f4f6:#6b7280").split(":");return{bg:c[0],col:c[1]};};
const STEPS=["Client","Photos","Rapport","Aperçu","Email"];
const today=new Date().toISOString().split("T")[0];

let step=0, sel=null, photos={}, saved=false, sending=false;
let q="", emailObj="", emailBody="";
let clients=[], loadingClients=false;
let R={date:today,intervenants:"2",duree:"0.5",produits:"Eau pure",observations:"",taches:"",difficultes:"RAS",recommandations:""};

function showErr(m){const e=document.getElementById("err");e.textContent=m;e.style.display=m?"block":"none";}

// Load clients from Notion DB
async function loadClients(){
  loadingClients=true;
  render();
  try{
    let all=[], cursor=undefined, hasMore=true;
    while(hasMore){
      const body={page_size:100,filter:{or:EXCLUDE.map(s=>({property:"État",status:{does_not_equal:s}}))}};
      if(cursor) body.start_cursor=cursor;
      const data=await notionCall("POST",`databases/${DB_ID}/query`,body);
      if(data.object==="error") throw new Error(data.message||"Erreur Notion");
      all=all.concat(data.results);
      hasMore=data.has_more;
      cursor=data.next_cursor;
    }
    clients=all.map(p=>{
      const props=p.properties;
      const nom=props["Nom"]?.title?.[0]?.plain_text||props["Name"]?.title?.[0]?.plain_text||"Sans nom";
      const email=props["Email"]?.email||"";
      const m2=props["m2"]?.number||0;
      const etat=props["État"]?.status?.name||props["État"]?.select?.name||"";
      const dateVal=props["Date"]?.date?.start||props["date:Date:start"]?.date?.start||"";
      const id=props["Identifiant"]?.rich_text?.[0]?.plain_text||props["ID"]?.rich_text?.[0]?.plain_text||"";
      return{url:p.url,pageId:p.id,nom,email,m2,etat,date:dateVal,id};
    }).filter(c=>!EXCLUDE.includes(c.etat));
    clients.sort((a,b)=>{
      if(!a.date) return 1;
      if(!b.date) return -1;
      return a.date < b.date ? -1 : a.date > b.date ? 1 : 0;
    });
  }catch(e){showErr("Erreur chargement Notion: "+e.message);}
  loadingClients=false;
  render();
}

function render(){
  document.getElementById("prog").innerHTML=STEPS.map((l,i)=>`<div class="ps ${i===step?"active":i<step?"done":""}">${i<step?"✓ ":""}${l}</div>`).join("");
  const el=document.getElementById("main");
  if(step===0) el.innerHTML=s0();
  else if(step===1) el.innerHTML=s1();
  else if(step===2) el.innerHTML=s2();
  else if(step===3) el.innerHTML=s3();
  else el.innerHTML=s4();
  document.getElementById("nav").innerHTML=nav();
}

function nav(){
  let h="";
  if(step>0) h+=`<button class="btn bl" style="flex:1" onclick="go(step-1)">← Retour</button>`;
  if(step<4){
    const ok=canNext();
    const lbl=step===3&&!saved?"Sauvegarder d'abord ↑":"Suivant →";
    h+=`<button class="btn bp" style="flex:2" ${ok?"":"disabled"} onclick="go(step+1)">${lbl}</button>`;
  }
  return h;
}

function canNext(){
  if(step===0) return!!sel;
  if(step===2) return!!(R.date&&R.observations);
  if(step===3) return saved;
  return true;
}

function go(n){showErr("");step=n;render();}

function s0(){
  if(loadingClients) return`<div class="card"><div class="loading"><div class="spinner"></div><br>Chargement depuis Notion...</div></div>`;
  if(!clients.length&&!loadingClients) return`<div class="card"><h2>1. Sélectionner l'intervention</h2><button class="btn bp" onclick="loadClients()">🔗 Charger les interventions</button></div>`;
  const list=clients.filter(c=>!q||(c.nom+c.id).toLowerCase().includes(q.toLowerCase()));
  return`<div class="card">
    <h2>1. Sélectionner l'intervention</h2>
    <div style="display:flex;gap:8px;align-items:center;margin-bottom:8px">
      <input placeholder="🔍 Nom ou référence..." value="${q}" oninput="q=this.value;renderMain()" style="flex:1">
      <button onclick="loadClients()" style="background:#f1f5f9;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;cursor:pointer;font-size:16px;flex-shrink:0">🔄</button>
    </div>
    <div style="font-size:11px;color:#94a3b8;margin-bottom:8px">${list.length} intervention(s) — <span style="color:#22c55e">🟢 live · actualisation auto 30s</span></div>
    <div class="scroll">${list.map(c=>{
      const{bg,col}=ec(c.etat);
      return`<div class="ci${sel&&sel.pageId===c.pageId?" sel":""}" onclick="setSel('${c.pageId}')">
        <div style="flex:1;min-width:0">
          <div class="ci-name">${c.nom}</div>
          <div class="ci-sub">${c.id?" #"+c.id+" · ":""}${c.date} · ${c.m2} m²</div>
        </div>
        <span class="badge" style="background:${bg};color:${col}">${c.etat}</span>
      </div>`;}).join("")||`<div style="text-align:center;padding:20px;color:#94a3b8;font-size:13px">Aucune intervention active trouvée</div>`}
    </div>
    ${sel?`<div class="info">✓ Sélectionné : <strong>${sel.nom}</strong></div>`:""}
  </div>`;
}

function renderMain(){const el=document.getElementById("main");el.innerHTML=s0();}
function setSel(id){sel=clients.find(c=>c.pageId===id);render();}

function s1(){
  return`<div class="card">
    <h2>2. Photos d'intervention</h2>
    <p style="font-size:12px;color:#64748b;margin-bottom:12px"><strong>${sel.nom}</strong> · ${sel.m2} m²</p>
    <div class="pgrid">${PHOTOS.map(s=>{const p=photos[s.k];return`<label class="pbox${p?" got":""}">
      <input type="file" accept="image/*" capture="environment" onchange="addPhoto('${s.k}',this)">
      ${p?`<img src="${p.url}"><div class="plbl ok">✓ ${s.l}</div>`:`<div style="font-size:20px;padding-top:8px">📷</div><div class="plbl">${s.l}</div>`}
    </label>`;}).join("")}</div>
    <div class="warn">${Object.keys(photos).length}/${PHOTOS.length} photos · L'appareil photo s'ouvre directement</div>
  </div>`;
}

function addPhoto(key,input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{photos[key]={url:e.target.result,name:file.name,data:e.target.result};render();};
  reader.readAsDataURL(file);
}

function s2(){
  return`<div class="card">
    <h2>3. Informations du rapport</h2>
    <div class="grid2">
      <div><label class="lbl">📅 Date</label><input type="date" value="${R.date}" oninput="R.date=this.value"></div>
      <div><label class="lbl">👷 Intervenants</label><input type="number" value="${R.intervenants}" oninput="R.intervenants=this.value"></div>
      <div><label class="lbl">⏱ Durée (jours)</label><input type="number" step="0.5" value="${R.duree}" oninput="R.duree=this.value"></div>
      <div><label class="lbl">🧴 Produits</label><input type="text" value="${R.produits}" oninput="R.produits=this.value"></div>
    </div>
    <label class="lbl">📝 Observations générales *</label>
    <textarea oninput="R.observations=this.value" placeholder="État général, type de saleté...">${R.observations}</textarea>
    <label class="lbl">🔧 Tâches significatives</label>
    <textarea oninput="R.taches=this.value" placeholder="Travaux particuliers...">${R.taches}</textarea>
    <label class="lbl">⚠️ Difficultés rencontrées</label>
    <textarea rows="2" oninput="R.difficultes=this.value">${R.difficultes}</textarea>
    <label class="lbl">💡 Recommandations</label>
    <textarea oninput="R.recommandations=this.value" placeholder="Pour la prochaine intervention...">${R.recommandations}</textarea>
  </div>`;
}

function s3(){
  const thumbs=Object.entries(photos).map(([k,v])=>`<div style="text-align:center;display:inline-block;margin:3px">
    <img src="${v.data}" style="width:65px;height:50px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0">
    <div style="font-size:9px;color:#64748b;margin-top:2px">${PHOTOS.find(s=>s.k===k)?.l||k}</div>
  </div>`).join("");
  return`<div class="card">
    <h2>4. Aperçu & Sauvegarde</h2>
    <div class="prev-hdr">
      <div><div style="font-weight:800;font-size:14px">☀️ Cleanosolar</div><div style="font-size:10px;opacity:.75">Rapport d'intervention</div></div>
      <div style="text-align:right;font-size:11px"><div style="font-weight:700">Réf. ${sel.id||"—"}</div><div>${R.date}</div></div>
    </div>
    <div class="prev-body">
      <div style="font-weight:700;font-size:14px;color:#1e293b;margin-bottom:10px">${sel.nom}</div>
      <div class="mgrid">
        <div><span style="color:#64748b">Surface :</span> <strong>${sel.m2} m²</strong></div>
        <div><span style="color:#64748b">Date :</span> <strong>${R.date}</strong></div>
        <div><span style="color:#64748b">Intervenants :</span> <strong>${R.intervenants}</strong></div>
        <div><span style="color:#64748b">Durée :</span> <strong>${R.duree}j</strong></div>
        <div><span style="color:#64748b">Produits :</span> <strong>${R.produits}</strong></div>
        <div><span style="color:#64748b">Photos :</span> <strong>${Object.keys(photos).length}</strong></div>
      </div>
      ${R.observations?`<div class="stitle">📝 Observations</div><div class="sec">${R.observations}</div>`:""}
      ${R.taches?`<div class="stitle">🔧 Tâches</div><div class="sec">${R.taches}</div>`:""}
      ${R.difficultes&&R.difficultes!=="RAS"?`<div class="stitle">⚠️ Difficultés</div><div class="sec">${R.difficultes}</div>`:""}
      ${R.recommandations?`<div class="stitle">💡 Recommandations</div><div class="sec">${R.recommandations}</div>`:""}
      ${Object.keys(photos).length?`<div class="stitle">📷 Photos (${Object.keys(photos).length})</div><div style="margin-top:4px">${thumbs}</div>`:""}
    </div>
    <button class="btn bl" onclick="printPDF()">🖨️ Exporter PDF</button>
    ${!saved
      ?`<button class="btn bp" id="btn-save" onclick="saveNotion()">${sending?"⏳ Envoi...":"🚀 Enregistrer dans Notion"}</button>`
      :`<div class="ok-box">✅ Enregistré dans Notion !</div>`}
  </div>`;
}

function s4(){
  if(!emailBody) buildEmail();
  return`<div class="card">
    <h2>5. Email au client</h2>
    <p style="font-size:12px;color:#64748b;margin-bottom:4px">Destinataire : <strong>${sel.email||"Email non renseigné"}</strong></p>
    <label class="lbl">Objet</label>
    <input value="${emailObj.replace(/"/g,'&quot;')}" oninput="emailObj=this.value">
    <label class="lbl">Corps du message</label>
    <textarea rows="12" oninput="emailBody=this.value">${emailBody}</textarea>
    <div class="info">
      💡 <strong>Envoyer via Infomaniak :</strong><br>
      1. "Ouvrir messagerie" → email pré-rempli<br>
      2. Joignez le PDF exporté<br>
      3. Envoyez !
    </div>
    <button class="btn bp" onclick="openMail()" style="margin-top:10px">📨 Ouvrir dans ma messagerie</button>
    <button class="btn bl" id="btn-cp" onclick="copyMail()">📋 Copier l'email</button>
    <button class="btn bl" onclick="printPDF()">🖨️ Ré-exporter PDF</button>
    <button class="btn bd" onclick="reset()" style="margin-top:4px">🔄 Nouveau rapport</button>
  </div>`;
}

async function saveNotion(){
  if(sending)return;
  sending=true;showErr("");
  const btn=document.getElementById("btn-save");
  if(btn) btn.textContent="⏳ Envoi vers Notion...";
  try{
    const pnames=Object.entries(photos).map(([k])=>PHOTOS.find(s=>s.k===k)?.l||k);
    const blocks=buildBlocks(pnames);
    const res=await notionCall("PATCH",`blocks/${sel.pageId}/children`,{children:blocks});
    if(res.object==="error") throw new Error(res.message||"Erreur Notion");
    saved=true;
    await notionCall("PATCH",`pages/${sel.pageId}`,{properties:{État:{status:{name:"Nettoyé"}}}});
  }catch(e){showErr("Erreur réseau: "+e.message);}
  sending=false;
  render();
}

function buildBlocks(photoNames){
  const b=[];
  const t=txt=>({type:"paragraph",paragraph:{rich_text:[{type:"text",text:{content:txt||""}}]}});
  const h2=txt=>({type:"heading_2",heading_2:{rich_text:[{type:"text",text:{content:txt}}]}});
  const div=()=>({type:"divider",divider:{}});
  b.push(div());
  b.push(h2("Rapport d'intervention "+new Date().getFullYear()));
  b.push(t("📅 Date : "+R.date));
  b.push(t("👷 Intervenants : "+R.intervenants));
  b.push(t("⏱ Durée : "+R.duree+" jour(s)"));
  b.push(t("🧴 Produits : "+R.produits));
  b.push(t("📐 Surface : "+sel.m2+" m²"));
  if(R.observations){b.push(h2("Observations générales"));b.push(t(R.observations));}
  if(R.taches){b.push(h2("Tâches significatives"));b.push(t(R.taches));}
  if(R.difficultes&&R.difficultes!=="RAS"){b.push(h2("Difficultés"));b.push(t(R.difficultes));}
  if(R.recommandations){b.push(h2("Recommandations"));b.push(t(R.recommandations));}
  if(photoNames.length){b.push(h2("Photos ("+photoNames.length+")"));b.push(t(photoNames.join(" | ")));}
  b.push(div());
  return b;
}

function buildEmail(){
  const isSIG=sel.id&&(sel.id.startsWith("SIG")||sel.id.startsWith("SIGSOLAR"));
  emailObj=`Rapport d'intervention – ${sel.nom} – ${R.date}`;
  emailBody=`Madame, Monsieur,

Nous vous faisons parvenir ci-joint le rapport d'intervention concernant le nettoyage de vos panneaux solaires${isSIG?" (Ville de Genève)":""}.

📅 Date : ${R.date}
📐 Surface nettoyée : ${sel.m2} m²
👷 Équipe : ${R.intervenants} intervenant(s) — Durée : ${R.duree} jour(s)
🧴 Produits utilisés : ${R.produits}

Observations : ${R.observations}
${R.recommandations?"Recommandations : "+R.recommandations+"\n":""}
Le rapport complet avec photos est disponible en pièce jointe (PDF).

Nous restons à votre disposition pour toute question.

Cordialement,
L'équipe Cleanosolar`;
}

function openMail(){
  const b=encodeURIComponent(emailBody+"\n\n⚠️ Joindre le PDF du rapport.");
  window.location.href=`mailto:${sel.email||""}?subject=${encodeURIComponent(emailObj)}&body=${b}`;
}

function copyMail(){
  const txt=`OBJET: ${emailObj}\n\n${emailBody}`;
  if(navigator.clipboard){navigator.clipboard.writeText(txt);}
  else{const ta=document.createElement("textarea");ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand("copy");document.body.removeChild(ta);}
  const b=document.getElementById("btn-cp");
  b.textContent="✓ Copié !";b.className="btn bg";
  setTimeout(()=>{b.textContent="📋 Copier l'email";b.className="btn bl";},2000);
}

function printPDF(){
  const thumbs=Object.entries(photos).map(([k,v])=>`
    <div style="display:inline-block;width:30%;margin:1%;vertical-align:top;text-align:center">
      <img src="${v.data}" style="width:100%;height:100px;object-fit:cover;border-radius:6px;border:1px solid #e2e8f0">
      <div style="font-size:10px;color:#64748b;margin-top:3px">${PHOTOS.find(s=>s.k===k)?.l||k}</div>
    </div>`).join("");
  const w=window.open("","_blank");
  w.document.write(`<!DOCTYPE html><html><head><meta charset="utf-8"><title>Rapport – ${sel.nom}</title>
  <style>body{font-family:Arial,sans-serif;padding:28px;color:#1e293b;font-size:13px}
  .hdr{display:flex;justify-content:space-between;border-bottom:3px solid #1e3a5f;padding-bottom:14px;margin-bottom:18px}
  .logo{font-size:20px;font-weight:800;color:#1e3a5f}.logo span{color:#2563eb}
  .meta{display:grid;grid-template-columns:1fr 1fr;gap:5px 20px;background:#f8fafc;border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px}
  h2{font-size:12px;font-weight:700;color:#1e3a5f;border-left:3px solid #2563eb;padding-left:8px;margin:14px 0 5px}
  .sec{background:#f8fafc;border-radius:6px;padding:9px 12px;font-size:12px;line-height:1.6;margin-bottom:8px}
  .footer{margin-top:24px;border-top:1px solid #e2e8f0;padding-top:10px;font-size:10px;color:#94a3b8;display:flex;justify-content:space-between}
  @media print{body{padding:16px}}</style></head><body>
  <div class="hdr">
    <div><div class="logo">☀️ Cleano<span>solar</span></div><div style="font-size:10px;color:#64748b;margin-top:2px">Nettoyage professionnel de panneaux solaires</div></div>
    <div style="text-align:right;font-size:11px"><div style="font-weight:700;font-size:13px">RAPPORT D'INTERVENTION</div><div>Réf. ${sel.id||"—"}</div><div>${R.date}</div></div>
  </div>
  <div style="font-weight:700;font-size:15px;margin-bottom:12px">${sel.nom}</div>
  <div class="meta">
    <div><span style="color:#64748b">Surface :</span> <strong>${sel.m2} m²</strong></div>
    <div><span style="color:#64748b">Date :</span> <strong>${R.date}</strong></div>
    <div><span style="color:#64748b">Intervenants :</span> <strong>${R.intervenants}</strong></div>
    <div><span style="color:#64748b">Durée :</span> <strong>${R.duree} jour(s)</strong></div>
    <div><span style="color:#64748b">Produits :</span> <strong>${R.produits}</strong></div>
    <div><span style="color:#64748b">Photos :</span> <strong>${Object.keys(photos).length}</strong></div>
  </div>
  ${R.observations?`<h2>📝 Observations générales</h2><div class="sec">${R.observations}</div>`:""}
  ${R.taches?`<h2>🔧 Tâches significatives</h2><div class="sec">${R.taches}</div>`:""}
  ${R.difficultes&&R.difficultes!=="RAS"?`<h2>⚠️ Difficultés</h2><div class="sec">${R.difficultes}</div>`:""}
  ${R.recommandations?`<h2>💡 Recommandations</h2><div class="sec">${R.recommandations}</div>`:""}
  ${Object.keys(photos).length?`<h2>📷 Photos d'intervention</h2>${thumbs}`:""}
  <div class="footer"><div>Cleanosolar SA</div><div>Généré le ${new Date().toLocaleDateString("fr-CH")}</div></div>
  </body></html>`);
  w.document.close();setTimeout(()=>w.print(),500);
}

function reset(){
  step=0;sel=null;photos={};saved=false;sending=false;emailObj="";emailBody="";
  R={date:today,intervenants:"2",duree:"0.5",produits:"Eau pure",observations:"",taches:"",difficultes:"RAS",recommandations:""};
  showErr("");render();
}

// Auto-load on start + refresh every 30s
loadClients();
setInterval(()=>{ if(step===0) loadClients(); }, 30000);
</script>
</body>
</html>
